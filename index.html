<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favila City Role Play</title>

<!-- الخطوط -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  background:url('https://wallpapercave.com/wp/wp2757874.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
  text-align:center;
  height:100vh;
}

/* الشعار العلوي */
header{
  background:rgba(0,0,0,0.7);
  padding:25px;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

h1{
  font-size:42px;
  margin-bottom:10px;
  text-shadow: 2px 2px 5px #000;
}

/* الحاوية للأزرار */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:60px;
}

/* تصميم الأزرار */
button{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:18px 45px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#5865F2,#404eed);
  color:white;
  cursor:pointer;
  transition:0.4s;
  width:260px;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

/* الأيقونات داخل الأزرار */
button img{
  width:25px;
  height:25px;
}

/* التذييل */
.footer{
  margin-top:50px;
  opacity:0.8;
}

.footer a{
  color:#8ab4ff;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>Favila City Role Play 💜</h1>
</header>

<div class="container">

<button onclick="window.location.href='https://discord.gg/bzuJrcMaK'">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord"> Discord
</button>

<button onclick="window.location.href='favila.html'">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="Server"> Favila Server
</button>

<button onclick="window.location.href='faction.html'">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="Faction"> FACTION
</button>

<button onclick="window.location.href='gang.html'">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Gang"> GANG
</button>

<button onclick="window.location.href='citizen.html'">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Citizen"> CITIZEN
</button>

</div>

<div class="footer">
<p>BY <a href="https://discord.gg/sg7e9YgK">YOUCEF</a></p>
</div>

</body>
</html>
